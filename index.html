<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0b0b0b">
  <title>S.E. Global — Strategic Vault</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230b0b0b' width='192' height='192' rx='24'/%3E%3Ctext x='96' y='115' font-family='serif' font-size='72' fill='%23b89a4b' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0b0b;
      --bg-secondary: #111111;
      --bg-tertiary: #151515;
      --bg-hover: #1b1b1b;
      --border: #3a3424;
      --border-hover: #b89a4b;
      --text-primary: #f5e6b8;
      --text-secondary: #b8aa7a;
      --text-muted: #9b8d63;
      --accent: #b89a4b;
      --accent-text: #000000;
      --danger: #8b3a3a;
      --success: #4ade80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .font-cinzel { font-family: 'Cinzel', serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .watermark {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.025;
      font-family: 'Cinzel', serif;
      font-size: clamp(60px, 14vw, 220px);
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--text-primary);
      user-select: none;
      text-transform: uppercase;
    }

    /* Login */
    #loginOverlay {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), visibility 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    #loginOverlay.hidden { opacity: 0; pointer-events: none; }
    .login-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px;
      width: 90%; max-width: 420px;
      text-align: center;
      position: relative; z-index: 10;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    }
    .login-box h1 { font-size: 2rem; margin-bottom: 8px; letter-spacing: 0.12em; }
    .login-box .subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 0.9rem; }
    .input-field {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      margin-bottom: 14px;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,154,75,0.1); }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: linear-gradient(135deg, #b89a4b 0%, #9a7e3a 100%);
      color: var(--accent-text);
      box-shadow: 0 4px 20px rgba(184,154,75,0.25);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      margin-top: 12px;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* Layout */
    .app-container { display: flex; min-height: 100vh; position: relative; opacity: 1; }
    .sidebar {
      width: 290px;
      background: rgba(17,17,17,0.98);
      border-right: 1px solid var(--border);
      padding: 32px 22px;
      display: flex; flex-direction: column; gap: 24px;
      position: relative; z-index: 10;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar-header h1 { font-size: 1.7rem; letter-spacing: 0.14em; }
    .sidebar-header p { color: var(--text-secondary); font-size: 0.8rem; margin-top: 6px; letter-spacing: 0.05em; }
    .vault-status {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }
    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px rgba(74,222,128,0.4); }
    .status-text { font-size: 0.78rem; color: var(--text-secondary); letter-spacing: 0.05em; text-transform: uppercase; }
    .lock-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .lock-btn:hover { border-color: var(--danger); color: var(--danger); }

    .nav-section { display: flex; flex-direction: column; gap: 3px; }
    .nav-item {
      text-align: left;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-primary);
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; gap: 12px;
      font-family: 'Inter', sans-serif;
      position: relative;
    }
    .nav-item:hover { background: var(--bg-hover); border-color: var(--border); }
    .nav-item.active { background: var(--bg-hover); border-color: var(--border); color: var(--accent); }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0;
    }
    .nav-icon { width: 22px; text-align: center; opacity: 0.6; font-size: 0.9rem; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-count { margin-left: auto; font-size: 0.72rem; opacity: 0.45; font-variant-numeric: tabular-nums; }

    .main {
      flex: 1;
      padding: 36px 40px;
      position: relative; z-index: 10;
      overflow-y: auto;
      max-height: 100vh;
    }
    .header {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-end;
      gap: 20px; margin-bottom: 36px;
    }
    .header h2 { font-size: 2.4rem; line-height: 1.1; }
    .header p { color: var(--text-secondary); margin-top: 8px; font-size: 1.05rem; }
    .search-box { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .search-input {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text-primary);
      min-width: 280px;
      outline: none;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .btn-add {
      background: linear-gradient(135deg, #b89a4b 0%, #9a7e3a 100%);
      color: var(--accent-text);
      border: none;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(184,154,75,0.2);
      font-family: 'Inter', sans-serif;
    }
    .btn-add:active { transform: scale(0.97); }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.2s;
    }
    .stat-card:hover { border-color: rgba(184,154,75,0.4); }
    .stat-card p { color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 10px; letter-spacing: 0.03em; text-transform: uppercase; }
    .stat-card h4 { font-size: 1.9rem; font-family: 'Cinzel', serif; color: var(--text-primary); }

    /* Files */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }
    .file-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 26px;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      display: flex; flex-direction: column;
    }
    .file-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .file-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
    .file-title { font-size: 1.2rem; line-height: 1.35; color: var(--text-primary); }
    .file-category { color: var(--text-secondary); font-size: 0.82rem; margin-top: 6px; letter-spacing: 0.02em; }
    .file-badge {
      font-size: 0.68rem;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .file-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; margin-top: auto; }
    .file-tag {
      font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }
    .file-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid rgba(58,52,36,0.4); }
    .file-date { font-size: 0.8rem; color: var(--text-muted); }
    .file-actions { display: flex; gap: 8px; }
    .btn-small {
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-small:hover { border-color: var(--accent); color: var(--accent); }
    .btn-small.primary {
      background: linear-gradient(135deg, #b89a4b 0%, #9a7e3a 100%);
      color: var(--accent-text);
      border-color: transparent;
    }
    .btn-small.primary:hover { opacity: 0.9; color: var(--accent-text); }
    .btn-icon {
      padding: 9px 11px;
      font-size: 0.85rem;
    }

    /* Bottom */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
    }
    .panel h3 { font-size: 1.25rem; margin-bottom: 20px; color: var(--text-primary); }
    .activity-list { display: flex; flex-direction: column; gap: 14px; }
    .activity-item {
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(58,52,36,0.35);
      color: var(--text-secondary);
      font-size: 0.88rem;
      line-height: 1.45;
    }
    .activity-item:last-child { border-bottom: none; padding-bottom: 0; }
    .activity-time { display: block; font-size: 0.72rem; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.03em; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 28px;
      width: 100%; max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 36px;
      position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal h3 { font-size: 1.5rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .source-toggle { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .source-btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .source-btn:hover { border-color: var(--accent); color: var(--accent); }
    .source-btn.active {
      background: linear-gradient(135deg, #b89a4b 0%, #9a7e3a 100%);
      color: var(--accent-text);
      border-color: transparent;
      font-weight: 600;
    }
    .tag-input-container {
      display: flex; flex-wrap: wrap; gap: 6px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      min-height: 52px;
      align-items: center;
      cursor: text;
      transition: all 0.2s;
    }
    .tag-input-container:focus-within { border-color: var(--accent); }
    .tag-chip {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 0.8rem;
      display: flex; align-items: center; gap: 6px;
      color: var(--text-secondary);
    }
    .tag-chip button {
      background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0;
    }
    .tag-input {
      background: transparent; border: none; outline: none; color: var(--text-primary); flex: 1; min-width: 80px; font-size: 0.9rem; font-family: 'Inter', sans-serif;
    }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 12px 22px; border-radius: 12px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.9rem; transition: all 0.2s; }
    .btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
    .btn-save { background: linear-gradient(135deg, #b89a4b 0%, #9a7e3a 100%); color: var(--accent-text); border: none; padding: 12px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.9rem; box-shadow: 0 4px 20px rgba(184,154,75,0.2); }
    .btn-save:active { transform: scale(0.97); }

    /* Note viewer */
    .note-viewer {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 14px;
      padding: 16px 22px;
      color: var(--text-primary);
      font-size: 0.9rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1);
      max-width: 340px;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Empty */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1 / -1; }
    .empty-state h3 { color: var(--text-secondary); margin-bottom: 10px; font-family: 'Cinzel', serif; font-size: 1.3rem; }
    .empty-state p { font-size: 0.9rem; max-width: 400px; margin: 0 auto; line-height: 1.5; }

    /* Mobile */
    .mobile-toggle {
      display: none; position: fixed; top: 20px; left: 20px; z-index: 100;
      background: var(--bg-secondary); border: 1px solid var(--border);
      color: var(--text-primary); width: 44px; height: 44px;
      border-radius: 12px; cursor: pointer; align-items: center; justify-content: center;
      font-size: 1.2rem; backdrop-filter: blur(10px);
    }
    .sidebar-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; backdrop-filter: blur(4px);
    }
    @media (max-width: 1024px) {
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-110%); z-index: 50; box-shadow: 20px 0 60px rgba(0,0,0,0.5); }
      .sidebar.open { transform: translateX(0); }
      .sidebar.open + .sidebar-backdrop { display: block; }
      .main { padding: 80px 20px 24px; max-height: none; }
      .mobile-toggle { display: flex; }
      .bottom-grid { grid-template-columns: 1fr; }
      .file-grid { grid-template-columns: 1fr; }
      .header h2 { font-size: 1.8rem; }
      .search-input { min-width: unset; width: 100%; }
      .search-box { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="watermark">S.E Global</div>

  <!-- Login -->
  <div id="loginOverlay">
    <div class="login-box">
      <h1 class="font-cinzel">S.E. GLOBAL</h1>
      <p class="subtitle">Strategic Vault System</p>
      <div id="loginForm">
        <input type="password" id="passwordInput" class="input-field" placeholder="Enter vault password" onkeypress="if(event.key==='Enter')authenticate()">
        <button class="btn btn-primary" onclick="authenticate()">Unlock Vault</button>
      </div>
      <div id="setupForm" style="display:none;">
        <p style="margin-bottom:18px;color:var(--text-secondary);font-size:0.85rem;line-height:1.5;">Initialize your vault. Create a master password to secure all indexed metadata locally.</p>
        <input type="password" id="newPassword" class="input-field" placeholder="New password" onkeypress="if(event.key==='Enter')document.getElementById('confirmPassword').focus()">
        <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm password" onkeypress="if(event.key==='Enter')setupPassword()">
        <button class="btn btn-primary" onclick="setupPassword()">Initialize Vault</button>
      </div>
    </div>
  </div>

  <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- App -->
  <div class="app-container" id="app" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="font-cinzel">S.E. GLOBAL</h1>
        <p>Strategic Vault System</p>
      </div>
      <div class="vault-status">
        <div class="status-row">
          <div class="status-dot"></div>
          <span class="status-text">Vault Secur
